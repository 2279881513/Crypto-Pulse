<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse — 信号回测</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0b0e17;color:#e8edf5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:12px}
#topbar{
    position:fixed;top:0;left:0;right:0;z-index:100;height:36px;
    display:flex;justify-content:space-between;align-items:center;
    padding:0 12px;background:rgba(11,14,23,0.95);border-bottom:1px solid #1a2340;
}
.tb-l{display:flex;align-items:center;gap:8px}
.tb-logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-link{color:#525f7a;text-decoration:none;font-size:11px}
.tb-link:hover{color:#8892b0}
.tb-r{display:flex;align-items:center;gap:6px;font-size:11px;color:#525f7a}
.tb-r select{background:#131a2b;border:1px solid #1e2a45;border-radius:4px;color:#e8edf5;padding:2px 6px;font-size:11px;outline:none}
.btn-r{padding:3px 10px;border:none;border-radius:4px;font-size:11px;font-weight:600;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;cursor:pointer}

/* 图表区域 — 占上半 */
#chart-wrap{
    position:fixed;top:36px;left:0;right:0;bottom:220px;
    border-bottom:1px solid #1a2340;
}
/* 表格面板 — 占下半 */
#panel{
    position:fixed;bottom:0;left:0;right:0;height:220px;
    display:flex;flex-direction:column;background:#0b0e17;
}
#statsbar{
    display:flex;align-items:center;gap:10px;padding:3px 12px;flex-shrink:0;
    border-bottom:1px solid #1a2340;font-size:10px;color:#525f7a;height:26px;
}
.st{display:flex;align-items:center;gap:2px}
.sl{color:#525f7a}
.sv{font-weight:600;font-family:'Courier New',monospace}
#table-wrap{flex:1;overflow-y:auto;padding:0 6px}
#table-wrap::-webkit-scrollbar{width:3px}
#table-wrap::-webkit-scrollbar-track{background:#131a2b}
#table-wrap::-webkit-scrollbar-thumb{background:#1e2a45;border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{position:sticky;top:0;background:#0f1420;padding:2px 4px;text-align:left;font-weight:600;color:#525f7a;font-size:9px;border-bottom:1px solid #1a2340;z-index:5}
td{padding:2px 4px;border-bottom:1px solid #0f1420;font-family:'Courier New',monospace;font-size:10px}
tr:hover td{background:#131a2b}
.td-time{color:#525f7a;font-size:9px}
.td-up{color:#2ecc71;font-weight:600}
.td-down{color:#e74c3c;font-weight:600}
.td-wait{color:#525f7a}
.td-ok{color:#2ecc71;font-weight:600}
.td-fail{color:#e74c3c;font-weight:600}
.td-price{text-align:right;color:#8892b0}
.td-score{text-align:right}
.td-conf{text-align:right}
</style>
</head>
<body>
<div id="topbar">
    <div class="tb-l">
        <span class="tb-logo">CryptoPulse</span>
        <a href="/" class="tb-link">← 信号</a>
        <a href="/chart" class="tb-link">📊 K线</a>
        <span style="color:#525f7a">📋 回测</span>
    </div>
    <div class="tb-r">
        <span id="tb-info">加载中...</span>
        <select id="sel-limit" onchange="loadData()">
            <option value="500">500</option>
            <option value="1000" selected>1000</option>
            <option value="1440">1440</option>
        </select>
        <button class="btn-r" onclick="loadData()">重载</button>
    </div>
</div>
<div id="chart-wrap"></div>
<div id="panel">
    <div id="statsbar"></div>
    <div id="table-wrap"></div>
</div>

<script>
let chart, candleSeries, volumeSeries;
let candles = [], signals = [], results = [];

function initChart() {
    const wrap = document.getElementById('chart-wrap');
    chart = LightweightCharts.createChart(wrap, {
        layout: { background:{type:'solid',color:'#0b0e17'}, textColor:'#525f7a', fontSize:10, fontFamily:'Courier New, monospace' },
        grid: { vertLines:{color:'#131a2b'}, horzLines:{color:'#131a2b'} },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine:{color:'#2a3a55',width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#1e2a45'}, horzLine:{color:'#2a3a55',width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#1e2a45'} },
        timeScale: { borderColor:'#1a2340', timeVisible:true, secondsVisible:false, tickMarkFormatter:t=>{const d=new Date(t*1000);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')} },
        rightPriceScale: { borderColor:'#1a2340' },
        handleScroll: { vertTouchDrag: false },
    });
    candleSeries = chart.addCandlestickSeries({ upColor:'#2ecc71', downColor:'#e74c3c', borderDownColor:'#e74c3c', borderUpColor:'#2ecc71', wickDownColor:'#e74c3c', wickUpColor:'#2ecc71' });
    volumeSeries = chart.addHistogramSeries({ color:'#1a2340', priceFormat:{type:'volume'}, priceScaleId:'' });
    chart.priceScale('').applyOptions({ scaleMargins:{top:0.8,bottom:0} });
    new ResizeObserver(() => { if(chart) chart.resize(wrap.clientWidth, wrap.clientHeight); }).observe(wrap);
    loadData();
}

function loadData() {
    const limit = document.getElementById('sel-limit').value;
    document.getElementById('tb-info').textContent = '加载中...';
    document.getElementById('table-wrap').innerHTML = '';
    fetch('/api/chart-data?style=short_term&limit=' + limit)
        .then(r => r.json()).then(d => {
            if (d.error) { document.getElementById('tb-info').textContent = '错误'; return; }
            candles = d.candles;
            signals = candles.filter(c => c.s);
            // 画K线
            candleSeries.setData(candles.map(c => ({time:Math.floor(c.t/1000), open:c.o, high:c.h, low:c.l, close:c.c})));
            volumeSeries.setData(candles.map(c => ({time:Math.floor(c.t/1000), value:c.v, color:c.c>=c.o?'rgba(46,204,113,0.2)':'rgba(231,76,60,0.2)'})));
            // 信号标记
            const markers = [];
            for (const s of signals) {
                const t = Math.floor(s.t/1000);
                if (s.s.direction === 'bullish') markers.push({time:t,position:'belowBar',color:'#2ecc71',shape:'arrowUp',text:'',size:1});
                else if (s.s.direction === 'bearish') markers.push({time:t,position:'aboveBar',color:'#e74c3c',shape:'arrowDown',text:'',size:1});
                else markers.push({time:t,position:'inBar',color:'#525f7a',shape:'circle',text:'',size:0.7});
            }
            candleSeries.setMarkers(markers);
            chart.timeScale().fitContent();
            // 计算验证结果
            calcResults();
            document.getElementById('tb-info').textContent = d.total + '根 · ' + signals.length + '信号';
        }).catch(() => { document.getElementById('tb-info').textContent = '加载失败'; });
}

function calcResults() {
    results = [];
    for (let i = 0; i < signals.length; i++) {
        const s = signals[i];
        const future = candles.filter(c => c.t > s.t);
        let verdict = 'pending';
        if (future.length >= 3) {
            const f3 = future[2].c;
            if (s.s.direction === 'bullish' && f3 > s.c) verdict = 'ok';
            else if (s.s.direction === 'bearish' && f3 < s.c) verdict = 'ok';
            else if (s.s.direction === 'neutral') verdict = 'skip';
            else verdict = 'fail';
        }
        results.push({ ...s, verdict, futureClose: future.length >= 3 ? future[2].c : null });
    }
    renderStats();
    renderTable();
}

function renderStats() {
    const total = results.length;
    const buys = results.filter(r => r.s.direction === 'bullish').length;
    const sells = results.filter(r => r.s.direction === 'bearish').length;
    const neuts = results.filter(r => r.s.direction === 'neutral').length;
    const ok = results.filter(r => r.verdict === 'ok').length;
    const fails = results.filter(r => r.verdict === 'fail').length;
    const checked = ok + fails;
    const acc = checked > 0 ? (ok/checked*100).toFixed(1) : '--';
    const ac = acc >= 60 ? '#2ecc71' : (acc >= 40 ? '#f1c40f' : '#e74c3c');
    document.getElementById('statsbar').innerHTML = `
        <div class="st"><span class="sl">信号</span><span class="sv">${total}</span></div>
        <div class="st"><span class="sl" style="color:#2ecc71">📈</span><span class="sv" style="color:#2ecc71">${buys}</span></div>
        <div class="st"><span class="sl" style="color:#e74c3c">📉</span><span class="sv" style="color:#e74c3c">${sells}</span></div>
        <div class="st"><span class="sl">⏸️</span><span class="sv" style="color:#525f7a">${neuts}</span></div>
        <div class="st"><span class="sl">✅</span><span class="sv" style="color:#2ecc71">${ok}</span></div>
        <div class="st"><span class="sl">❌</span><span class="sv" style="color:#e74c3c">${fails}</span></div>
        <div class="st"><span class="sl">准确率</span><span class="sv" style="color:${ac};font-size:12px">${acc}%</span></div>
        <div style="flex:1"></div>
        <div class="st"><span class="sl">显示最近 ${Math.min(200,results.length)} 条</span></div>
    `;
}

function renderTable() {
    const show = results.slice(-200).reverse();
    let html = '<table><thead><tr><th>时间</th><th>方向</th><th>评分</th><th>信心</th><th>信号价</th><th>3根后</th><th>结果</th></tr></thead><tbody>';
    show.forEach(r => {
        const d = new Date(r.t);
        const ts = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        const dc = r.s.direction === 'bullish' ? 'td-up' : (r.s.direction === 'bearish' ? 'td-down' : 'td-wait');
        const dt = r.s.direction === 'bullish' ? '📈多' : (r.s.direction === 'bearish' ? '📉空' : '⏸️');
        let rt = '', rc = '';
        if (r.verdict === 'ok') { rt = '✅'; rc = 'td-ok'; }
        else if (r.verdict === 'fail') { rt = '❌'; rc = 'td-fail'; }
        else if (r.verdict === 'skip') { rt = '-'; }
        else { rt = '⏳'; }
        html += '<tr><td class="td-time">'+ts+'</td><td class="'+dc+'">'+dt+'</td><td class="td-score">'+r.s.score+'</td><td class="td-conf">'+r.s.confidence+'%</td><td class="td-price">'+r.c.toFixed(1)+'</td><td class="td-price">'+(r.futureClose?r.futureClose.toFixed(1):'--')+'</td><td class="'+rc+'">'+rt+'</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('table-wrap').innerHTML = html;
}

initChart();
</script>
</body>
</html>
